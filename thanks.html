<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanks — Quote request received</title>
    <meta name="robots" content="noindex" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-2xl flex-col justify-center px-6 py-16">
      <div class="rounded-3xl border border-slate-200 bg-slate-50 p-10 shadow-sm">
        <div class="text-sm font-semibold text-slate-700">Request submitted</div>
        <h1 class="mt-3 text-3xl font-extrabold tracking-tight text-slate-950">Thanks — we’ll reply fast</h1>
        <p class="mt-4 text-slate-600">
          Your quote request has been received. If you have files to share (Gerbers, stackup, notes), reply to our email
          or send them directly.
        </p>

        <div class="mt-8 flex flex-col gap-3 sm:flex-row">
          <a
            href="/#contact"
            class="inline-flex items-center justify-center rounded-2xl bg-slate-900 px-6 py-3 text-base font-semibold text-white hover:bg-slate-800"
            >Submit another request</a
          >
          <a
            href="/"
            class="inline-flex items-center justify-center rounded-2xl border border-slate-300 bg-white px-6 py-3 text-base font-semibold text-slate-900 hover:bg-slate-50"
            >Back to home</a
          >
        </div>
      </div>
    </main>
  </body>
</html>
